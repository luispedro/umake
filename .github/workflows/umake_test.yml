name: umake test

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Install umake
      shell: bash -l {0}
      run : |
        uv sync --all-extras --dev
        uv pip install .
        uv pip install pytest
    - name: Test
      shell: bash -l {0}
      run: |
        uv run python -m pytest umake/tests/
        uv run umake --supports docx pdf

